<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆花點餐小幫手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #d4e8f0 25%, #c0dce8 50%, #b0d0e0 75%, #d4e8f0 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 立冬漂浮裝飾 - 雪花、楓葉、暖陽 */
        body::before {
            content: '❄️ 🍂 ☀️ 🌨️ 🍁 ☁️ 🌾 ⛄ ❄️ 🍂 ☀️ 🌨️';
            position: fixed;
            top: -50px;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 32px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: flex-start;
            gap: 80px;
            animation: floatingWinter 25s linear infinite;
        }

        @keyframes floatingWinter {
            0% { 
                transform: translateY(-100px) rotate(0deg);
            }
            100% { 
                transform: translateY(calc(100vh + 100px)) rotate(360deg);
            }
        }

        /* 暖冬光暈效果 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(100, 181, 246, 0.2) 15px, transparent 15px),
                radial-gradient(circle at 75% 35%, rgba(77, 182, 172, 0.18) 20px, transparent 20px),
                radial-gradient(circle at 45% 65%, rgba(255, 183, 77, 0.15) 12px, transparent 12px),
                radial-gradient(circle at 85% 75%, rgba(129, 199, 212, 0.22) 18px, transparent 18px),
                radial-gradient(circle at 15% 80%, rgba(174, 213, 129, 0.17) 14px, transparent 14px),
                radial-gradient(circle at 60% 20%, rgba(100, 181, 246, 0.2) 16px, transparent 16px);
            background-size: 
                250px 250px,
                220px 220px,
                280px 280px,
                200px 200px,
                260px 260px,
                240px 240px;
            animation: winterGlow 20s ease-in-out infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes winterGlow {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 0.6;
            }
            33% { 
                transform: translate(-12px, -18px) scale(1.08);
                opacity: 0.75;
            }
            66% { 
                transform: translate(15px, -12px) scale(0.95);
                opacity: 0.5;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            box-shadow: 
                0 20px 50px rgba(77, 182, 172, 0.3),
                0 0 0 3px rgba(129, 199, 212, 0.3),
                0 0 30px rgba(100, 181, 246, 0.2);
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            animation: winterAppear 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10;
        }

        @keyframes winterAppear {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(50px) rotate(-5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0) rotate(0deg);
            }
        }

        .header {
            background: linear-gradient(135deg, #4db6ac, #26a69a, #00897b);
            padding: 35px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 137, 123, 0.4);
        }

        .header::before {
            content: '❄️';
            position: absolute;
            font-size: 40px;
            opacity: 0.2;
            animation: snowFloat 3s ease-in-out infinite;
        }

        .header::before {
            top: 10px;
            left: 20px;
        }

        @keyframes snowFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: linear-gradient(135deg, #4db6ac, #26a69a, #00897b);
            clip-path: polygon(
                0 0, 5% 15px, 10% 0, 15% 20px, 20% 5px, 25% 18px, 
                30% 0, 35% 15px, 40% 8px, 45% 20px, 50% 0, 55% 17px,
                60% 5px, 65% 20px, 70% 0, 75% 15px, 80% 10px, 85% 20px,
                90% 0, 95% 18px, 100% 5px, 100% 25px, 0 25px
            );
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 
                2px 2px 4px rgba(0, 137, 123, 0.5),
                0 0 15px rgba(77, 182, 172, 0.4);
            margin-bottom: 8px;
            animation: winterBounce 2s ease-in-out infinite;
        }

        @keyframes winterBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .form-content {
            padding: 40px 30px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(224, 247, 250, 0.3) 100%);
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #00897b;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i {
            color: #26a69a;
            width: 16px;
        }

        .required::after {
            content: ' *';
            color: #ff6b6b;
            font-weight: bold;
        }

        input[type="text"], select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #b2dfdb;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f0fffe;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #26a69a;
            box-shadow: 0 0 0 5px rgba(38, 166, 154, 0.15), 0 0 20px rgba(77, 182, 172, 0.1);
            transform: translateY(-2px);
        }

        select {
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2326a69a' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 18px;
            background-color: #f0fffe;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .checkbox-item {
            position: relative;
        }

        .checkbox-item input[type="checkbox"] {
            display: none;
        }

        .checkbox-item label {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f0fffe;
            border: 2.5px solid #b2dfdb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 500;
            font-size: 14px;
            gap: 8px;
            margin-bottom: 0;
            color: #00897b;
        }

        .checkbox-item input[type="checkbox"]:checked + label {
            background: linear-gradient(135deg, #4db6ac, #26a69a);
            border-color: #00897b;
            color: white;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 137, 123, 0.4), 0 0 15px rgba(77, 182, 172, 0.2);
        }

        .checkbox-item label::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2.5px solid #26a69a;
            border-radius: 6px;
            background: white;
            transition: all 0.3s ease;
        }

        .checkbox-item input[type="checkbox"]:checked + label::before {
            background: #ff8a65;
            border-color: #ff8a65;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='m13.854 3.646-7.5 7.5a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6 10.293l7.146-7.147a.5.5 0 0 1 .708.708z'/%3e%3c/svg%3e");
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 12px;
        }

        .radio-group.ice-ginger-group {
            gap: 10px;
        }

        .radio-item {
            position: relative;
            flex: 1;
        }

        .radio-item input[type="radio"] {
            display: none;
        }

        .radio-item label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            background: #f0fffe;
            border: 2.5px solid #b2dfdb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 500;
            gap: 8px;
            margin-bottom: 0;
            color: #00897b;
        }

        .ice-ginger-group .radio-item label {
            padding: 12px 14px;
            font-size: 14px;
        }

        .radio-item input[type="radio"]:checked + label {
            background: linear-gradient(135deg, #80cbc4, #4db6ac);
            border-color: #26a69a;
            color: white;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(38, 166, 154, 0.4), 0 0 15px rgba(77, 182, 172, 0.3);
        }

        .radio-item label::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2.5px solid #26a69a;
            border-radius: 50%;
            background: white;
            transition: all 0.3s ease;
        }

        .radio-item input[type="radio"]:checked + label::before {
            background: white;
            border-color: white;
            box-shadow: inset 0 0 0 5px #80cbc4;
        }

        .error-message {
            color: #e91e63;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            padding: 10px 14px;
            background: rgba(233, 30, 99, 0.1);
            border-left: 4px solid #e91e63;
            border-radius: 8px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #4db6ac, #26a69a, #00897b);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            margin-top: 25px;
            box-shadow: 0 6px 25px rgba(0, 137, 123, 0.4), 0 0 20px rgba(77, 182, 172, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit::before {
            content: '❄️';
            position: absolute;
            font-size: 20px;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            animation: snowMove 2s linear infinite;
        }

        @keyframes snowMove {
            0% { left: -50px; opacity: 0; }
            50% { opacity: 1; }
            100% { left: calc(100% + 50px); opacity: 0; }
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 35px rgba(0, 137, 123, 0.5), 0 0 30px rgba(77, 182, 172, 0.3);
        }

        .btn-submit:hover::after {
            left: 100%;
        }

        .btn-submit:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                border-radius: 20px;
            }
            
            .header {
                padding: 28px 20px;
            }
            
            .form-content {
                padding: 30px 20px;
            }
            
            .checkbox-grid {
                grid-template-columns: 1fr;
            }
            
            .radio-group {
                flex-direction: column;
            }

            .radio-item {
                width: 100%;
            }
        }

        /* 載入動畫 */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading .btn-submit {
            background: linear-gradient(135deg, #9e9e9e, #757575);
        }

        .loading .btn-submit::before {
            content: '';
            animation: none;
        }

        .loading .btn-submit::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            margin: -11px 0 0 -11px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 冰晶裝飾 */
        .container::before {
            content: '❄️';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 35px;
            opacity: 0.25;
            z-index: 1;
        }

        .container::after {
            content: '🍂';
            position: absolute;
            bottom: 80px;
            left: 15px;
            font-size: 30px;
            opacity: 0.2;
            z-index: 1;
            transform: rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-bowl-rice"></i> 豆花點餐小幫手(統元豆花)</h1>
            <div class="subtitle">
                <i class="fas fa-heart"></i>
                <span>元宵節 ❄️ 暖心豆花，溫暖進補！</span>
            </div>
        </div>
        
        <div class="form-content">
            <form id="orderForm">
                <div class="form-group">
                    <label for="name" class="required">
                        <i class="fas fa-user"></i>
                        姓名
                    </label>
                    <input type="text" id="name" name="name" placeholder="請輸入您的姓名" required>
                    <div class="error-message" id="name-error">
                        <i class="fas fa-exclamation-triangle"></i>
                        姓名為必填欄位
                    </div>
                </div>

				<div class="form-group">
                    <label for="unit" class="required">
                        <i class="fas fa-building"></i>
                        單位
                    </label>
                    <select id="unit" name="unit" required>
                        <option value="">請選擇單位</option>
                        <option value="系統組">💻 系統組</option>
                        <option value="資安組">🔒 資安組</option>
                        <option value="作業組">📋 作業組</option>
                        <option value="其他">🏢 其他</option>
                    </select>
                    <div class="error-message" id="unit-error">
                        <i class="fas fa-exclamation-triangle"></i>
                        請選擇單位
                    </div>
                </div>

                <div class="form-group">
                    <label for="type" class="required">
                        <i class="fas fa-ice-cream"></i>
                        豆花種類
                    </label>
                    <select id="type" name="type" required>
                        <option value="">請選擇豆花種類</option>
                        <option value="豆花">🥛 傳統豆花</option>
                       <!-- <option value="布丁">🍮 布丁豆花</option>-->
                        <option value="仙草">🌿 嫩仙草凍</option>
                    </select>
                    <div class="error-message" id="type-error">
                        <i class="fas fa-exclamation-triangle"></i>
                        請選擇豆花種類
                    </div>
                </div>
				<div class="form-group">
					<label class="required">
						<i class="fas fa-temperature-half"></i>
						豆花冷熱
					</label>
					<div class="radio-group">
						<div class="radio-item">
							<input type="radio" id="temp-cold" name="temp" value="冷" checked>
							<label for="temp-cold">🧊 冷</label>
						</div>
						<div class="radio-item">
							<input type="radio" id="temp-hot" name="temp" value="熱">
							<label for="temp-hot">🔥 熱</label>
						</div>
					</div>
				</div>

                <div class="form-group">
                    <label class="required">
                        <i class="fas fa-plus-circle"></i>
                        配料選擇 (最多選三種)
                    </label>
                    <div class="checkbox-grid">
                        <div class="checkbox-item">
                            <input type="checkbox" id="peanut" name="topping" value="花生">
                            <label for="peanut">🥜 花生</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="redbean" name="topping" value="紅豆">
                            <label for="redbean">🔴 紅豆</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="greenbean" name="topping" value="綠豆">
                            <label for="greenbean">🟢 綠豆</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="kidney" name="topping" value="彎豆">
                            <label for="kidney">🌱 彎豆</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="tapioca" name="topping" value="粉圓">
                            <label for="tapioca">⚫ 粉圓</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="taro" name="topping" value="芋圓">
                            <label for="taro">🟣 芋圓</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="tangyuan" name="topping" value="湯圓">
                            <label for="tangyuan">⚪ 湯圓</label>
                        </div>
                        <!--<div class="checkbox-item">
                            <input type="checkbox" id="barley" name="topping" value="薏仁湯">
                            <label for="barley">🌾 薏仁湯</label>
                        </div>-->
                        <div class="checkbox-item">
                            <input type="checkbox" id="grass" name="topping" value="仙草">
                            <label for="grass">🌿 仙草</label>
                        </div>
                    </div>
                    <div class="error-message" id="topping-error">
                        <i class="fas fa-exclamation-triangle"></i>
                        請選擇至少一種，且最多三種配料
                    </div>
                </div>

				<div class="form-group">
					<label>
						<i class="fas fa-snowflake"></i>
						是否加冰或加薑
					</label>
					<div class="radio-group">
						<div class="radio-item">
							<input type="radio" id="ice-yes" name="iceginger" value="要加冰" checked>
							<label for="ice-yes">❄️ 要加冰</label>
						</div>
						<div class="radio-item">
							<input type="radio" id="ice-ginger" name="iceginger" value="要加薑">
							<label for="ice-ginger">🌱  要加薑</label>
						</div>
						<div class="radio-item">
							<input type="radio" id="ice-none" name="iceginger" value="都不加">
							<label for="ice-none">😌 都不加</label>
						</div>
					</div>
				</div>


                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i>
                    送出
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
		const form = document.getElementById('orderForm');
		const container = document.querySelector('.container');

		const typeSelect = document.getElementById('type');
		const barleyCheckbox = document.getElementById('barley');
		const allToppingCheckboxes = document.querySelectorAll('input[name="topping"]');

		const tempCold = document.getElementById('temp-cold');
		const tempHot = document.getElementById('temp-hot');

		const iceYesRadio = document.getElementById('ice-yes');
		const gingerRadio = document.getElementById('ice-ginger');
		const noneRadio = document.getElementById('ice-none');

		form.addEventListener('submit', function(event) {
			event.preventDefault();

			// 隱藏所有錯誤訊息
			const errorMessages = document.querySelectorAll('.error-message');
			errorMessages.forEach(msg => msg.style.display = 'none');

			let isValid = true;

			// 檢查姓名
			const nameInput = document.getElementById('name');
			if (nameInput.value.trim() === '') {
				document.getElementById('name-error').style.display = 'block';
				nameInput.focus();
				isValid = false;
			}

			// 檢查單位
			const unitInput = document.getElementById('unit');
			if (unitInput.value.trim() === '') {
				document.getElementById('unit-error').style.display = 'block';
				if (isValid) unitInput.focus();
				isValid = false;
			}

			// 檢查種類
			if (typeSelect.value === '') {
				document.getElementById('type-error').style.display = 'block';
				if (isValid) typeSelect.focus();
				isValid = false;
			}

			// 檢查配料
			const checkedToppings = document.querySelectorAll('input[name="topping"]:checked');
			if (checkedToppings.length === 0 || checkedToppings.length > 3) {
				document.getElementById('topping-error').style.display = 'block';
				isValid = false;
			}

			if (isValid) {
				// 添加載入效果
				container.classList.add('loading');

				const name = nameInput.value;
				const unit = unitInput.value;
				const type = typeSelect.value;

				const temp = document.querySelector('input[name="temp"]:checked').value;
				const toppings = Array.from(checkedToppings).map(cb => cb.value).join(', ');
				const iceginger = document.querySelector('input[name="iceginger"]:checked').value;

				setTimeout(() => {
					// Google Forms 提交
					const data = {
						'entry.2104530092': name,
						'entry.289096839': unit,
						'entry.989584200': type,
						'entry.868409599': temp,
						'entry.579343790': toppings,
						'entry.736923634': iceginger
						// TODO: 若 Google 表單有新增「豆花冷熱」欄位，請在此補上對應 entry
						// 例如：'entry.xxxxxx': temp
					};

					$.ajax({
						type: 'POST',
						url: 'https://docs.google.com/forms/u/0/d/e/1FAIpQLSdKNDUj4e8gzn_nbk2xUmxjqdVRL_z1gnOpzolvOBakAKuiVw/formResponse',
						data: data,
						contentType: 'application/json',
						dataType: 'jsonp',
						complete: function() {
							setTimeout(() => {
								container.classList.remove('loading');
								alert('✅ 資料已成功送出！謝謝您！');
								form.reset();

								// reset 後恢復預設狀態
								tempCold.checked = true;
								updateTempOptions();
								updateToppingAvailability();
								updateIceGingerOptions();
							}, 500);
						}
					});
				}, 1000);
			}
		});

		// 根據豆花種類，控制薏仁湯可不可選（#3）
		function updateToppingAvailability() {
			const selectedType = typeSelect.value;

			if (selectedType === '布丁' || selectedType === '仙草') {
				barleyCheckbox.disabled = true;
				barleyCheckbox.checked = false;
				barleyCheckbox.parentElement.style.opacity = '0.4';
				barleyCheckbox.parentElement.style.pointerEvents = 'none';
			} else {
				barleyCheckbox.disabled = false;
				barleyCheckbox.parentElement.style.opacity = '1';
				barleyCheckbox.parentElement.style.pointerEvents = 'auto';
			}
		}

		// 根據豆花種類，控制冷/熱選項（#1, #2）
		function updateTempOptions() {
			const selectedType = typeSelect.value;

			if (selectedType === '布丁') {
				// 布丁豆花沒有「熱」選項
				tempHot.disabled = true;
				tempHot.checked = false;
				tempHot.parentElement.style.opacity = '0.4';
				tempHot.parentElement.style.pointerEvents = 'none';

				tempCold.disabled = false;
				tempCold.parentElement.style.opacity = '1';
				tempCold.parentElement.style.pointerEvents = 'auto';

				if (!tempCold.checked) {
					tempCold.checked = true;
				}
			} else {
				// 其他種類：冷熱都可以選
				tempHot.disabled = false;
				tempHot.parentElement.style.opacity = '1';
				tempHot.parentElement.style.pointerEvents = 'auto';

				tempCold.disabled = false;
				tempCold.parentElement.style.opacity = '1';
				tempCold.parentElement.style.pointerEvents = 'auto';
			}
		}

		// 根據冷/熱 + 豆花種類，控制「是否加冰或加薑」選項（#4, #5, #6, #7）
		function updateIceGingerOptions() {
			const tempRadio = document.querySelector('input[name="temp"]:checked');
			const currentTemp = tempRadio ? tempRadio.value : null;
			const selectedType = typeSelect.value; // '豆花', '布丁', '仙草' 或 ''

			// 先全部恢復可選
			[iceYesRadio, gingerRadio, noneRadio].forEach(r => {
				r.disabled = false;
				r.parentElement.style.opacity = '1';
				r.parentElement.style.pointerEvents = 'auto';
			});

			if (!currentTemp) return;

			if (currentTemp === '冷') {
				// 冷：只能「要加冰」或「都不加」（#5）
				gingerRadio.disabled = true;
				gingerRadio.checked = false;
				gingerRadio.parentElement.style.opacity = '0.4';
				gingerRadio.parentElement.style.pointerEvents = 'none';

				if (!iceYesRadio.checked && !noneRadio.checked) {
					iceYesRadio.checked = true;
				}
			} else if (currentTemp === '熱') {
				if (selectedType === '豆花') {
					// 熱 + 傳統豆花：只能「要加薑」或「都不加」（#6）
					iceYesRadio.disabled = true;
					iceYesRadio.checked = false;
					iceYesRadio.parentElement.style.opacity = '0.4';
					iceYesRadio.parentElement.style.pointerEvents = 'none';

					if (!gingerRadio.checked && !noneRadio.checked) {
						gingerRadio.checked = true;
					}
				} else if (selectedType === '仙草') {
					// 熱 + 嫩仙草凍：只能「都不加」（#7）
					iceYesRadio.disabled = true;
					iceYesRadio.checked = false;
					iceYesRadio.parentElement.style.opacity = '0.4';
					iceYesRadio.parentElement.style.pointerEvents = 'none';

					gingerRadio.disabled = true;
					gingerRadio.checked = false;
					gingerRadio.parentElement.style.opacity = '0.4';
					gingerRadio.parentElement.style.pointerEvents = 'none';

					noneRadio.checked = true;
				} else {
					// 熱 + 其他（例如尚未選豆花種類）：暫時不限制
				}
			}
		}

		// 豆花種類變更時的邏輯
		typeSelect.addEventListener('change', function() {
			if (this.value !== '') {
				document.getElementById('type-error').style.display = 'none';
			}
			updateToppingAvailability();
			updateTempOptions();
			updateIceGingerOptions();
		});

		// 冷/熱變更時更新冰/薑選項
		document.querySelectorAll('input[name="temp"]').forEach(radio => {
			radio.addEventListener('change', function() {
				updateIceGingerOptions();
			});
		});

		// 即時驗證配料數量＋維持薏仁限制
		allToppingCheckboxes.forEach(checkbox => {
			checkbox.addEventListener('change', function() {
				const checkedCount = document.querySelectorAll('input[name="topping"]:checked').length;

				if (checkedCount >= 3) {
					allToppingCheckboxes.forEach(cb => {
						if (!cb.checked && !cb.disabled) {
							cb.disabled = true;
							cb.parentElement.style.opacity = '0.5';
						}
					});
				} else {
					allToppingCheckboxes.forEach(cb => {
						// 這裡要注意布丁/嫩仙草的薏仁限制
						if (cb.id !== 'barley' || (typeSelect.value !== '布丁' && typeSelect.value !== '仙草')) {
							cb.disabled = false;
							cb.parentElement.style.opacity = '1';
						}
					});
					updateToppingAvailability();
				}

				// 隱藏錯誤訊息
				if (checkedCount > 0 && checkedCount <= 3) {
					document.getElementById('topping-error').style.display = 'none';
				}
			});
		});

		// 輸入框即時驗證
		document.getElementById('name').addEventListener('input', function() {
			if (this.value.trim() !== '') {
				document.getElementById('name-error').style.display = 'none';
			}
		});

		// 頁面載入時先跑一次規則
		updateToppingAvailability();
		updateTempOptions();
		updateIceGingerOptions();
	</script>

</body>
</html>
